[pytest]
# Configuración base de pytest para el proyecto QA Automation Flow.

# Carpetas donde buscar tests
testpaths = tests

# Patrón de archivos de test
python_files = test_*.py

# Patrón de funciones de test
python_functions = test_*

# Patrón de clases de test
python_classes = Test*

# Marks personalizados (se usan con: pytest -m smoke)
markers =
    smoke: tests de humo, rápidos y críticos
    regression: tests de regresión completa
    api: pruebas de APIs (Fase 6)
    flaky: tests inestables conocidos (skip por defecto)

# Opciones por defecto
addopts =
    --strict-markers
    --tb=short
    --color=yes
    -v

# Playwright: navegador y modo por defecto se controlan vía .env / conftest.py
